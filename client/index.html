<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Watchtower</title>
  </head>
  <body style="margin:0;background:#0e0f12;">
    <div id="root">
      <!-- Pre-React splash. createRoot.render() replaces this with the App tree
           the moment main.tsx finishes loading. Inline so it paints on first
           frame, before the JS bundle is even parsed. -->
      <div
        style="
          position: fixed;
          inset: 0;
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          gap: 14px;
          background: #0e0f12;
          color: #9aa1ab;
          font-family: Inter, system-ui, -apple-system, sans-serif;
          font-size: 13px;
        "
      >
        <div
          style="
            width: 22px;
            height: 22px;
            border: 2px solid #2e333d;
            border-top-color: #7aa7ff;
            border-radius: 50%;
            animation: __wt_spin 0.8s linear infinite;
          "
        ></div>
        <div>Watchtower</div>
      </div>
    </div>
    <style>
      @keyframes __wt_spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
