<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="l1" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#9aa1ab"/>
      <stop offset="100%" stop-color="#6e757e"/>
    </linearGradient>
    <linearGradient id="l2" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0a868"/>
      <stop offset="100%" stop-color="#cf8a4d"/>
    </linearGradient>
    <linearGradient id="l3" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#7aa7ff"/>
      <stop offset="100%" stop-color="#5586dc"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="24"/>
      <feOffset dx="0" dy="12" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: dark slate rounded square (macOS Big Sur+ corner radius ~22.4%) -->
  <rect width="1024" height="1024" rx="224" fill="#15171c"/>

  <!-- Three layered slabs (Settings grey at bottom, TimeTracker amber middle, Instances blue top) -->
  <g filter="url(#shadow)">
    <rect x="128" y="656" width="768" height="160" rx="40" fill="url(#l1)"/>
    <rect x="208" y="464" width="608" height="160" rx="40" fill="url(#l2)"/>
    <rect x="288" y="272" width="448" height="160" rx="40" fill="url(#l3)"/>
  </g>
</svg>
