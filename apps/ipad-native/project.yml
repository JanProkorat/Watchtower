name: Watchtower
options:
  bundleIdPrefix: cz.greencode.watchtower
  deploymentTarget:
    iOS: "26.0"
packages:
  WatchtowerCore:
    path: ../../swift/WatchtowerCore
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.14.0"
  RoyalVNCKit:
    url: https://github.com/royalapplications/royalvnc
    revision: 337197afdb32020d3dfdb7d058989115b740cdc4
targets:
  Watchtower:
    type: application
    platform: iOS
    sources:
      - Watchtower
    dependencies:
      - package: WatchtowerCore
        product: WatchtowerCore
      - package: WatchtowerCore
        product: WatchtowerBridge
      - package: SwiftTerm
        product: SwiftTerm
      - package: WatchtowerCore
        product: WatchtowerRemote
      - package: RoyalVNCKit
        product: RoyalVNCKit
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cz.greencode.watchtower.ipados
        INFOPLIST_FILE: Watchtower/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        MARKETING_VERSION: "0.0.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "2"
    configFiles:
      Debug: Watchtower/Secrets.xcconfig
      Release: Watchtower/Secrets.xcconfig
